name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Node dependencies
      run: npm ci

    - name: Run unit tests
      run: npm test -- --run

    - name: Build project
      run: npm run build

  visual-regression-test:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Node dependencies
      run: npm ci

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright Pillow

    - name: Install Playwright Chromium
      run: npx playwright install chromium

    - name: Start Vite development server
      run: |
        npm run dev &
        echo "Waiting for server to be responsive on http://localhost:5173..."
        for i in {1..30}; do
          if curl -s http://localhost:5173 > /dev/null; then
            echo "Vite server is ready!"
            exit 0
          fi
          sleep 1
        done
        echo "Vite server failed to start in 30 seconds"
        exit 1
      shell: bash

    - name: Run visual regression tests
      run: python3 verification/run_all.py

    - name: Upload mismatch diffs as artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-diffs
        path: |
          verification/current/
          verification/diffs/
        if-no-files-found: ignore
