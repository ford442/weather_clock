name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install Node dependencies
              run: npm ci

            - name: Check formatting
              run: npm run format:check

            - name: Lint source
              run: npm run lint

            - name: Type-check JavaScript
              run: npm run typecheck

            - name: Run unit tests
              run: npm test -- --run

            - name: Build project
              run: npm run build

            - name: Check application bundle size
              run: npm run check:bundle-size

    visual-regression-test:
        runs-on: ubuntu-latest
        needs: build-and-test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install Node dependencies
              run: npm ci

            - name: Install Playwright Chromium
              run: npx playwright install --with-deps chromium

            - name: Run visual regression + functional e2e tests
              run: npx playwright test

            - name: Upload Playwright report and diffs as artifacts on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      playwright-report/
                      test-results/
                  if-no-files-found: ignore
